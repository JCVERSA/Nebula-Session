<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Bot — Pairing Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --text: #f1f1f3;
      --muted: rgba(255,255,255,0.35);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      animation: fadeUp 0.5s ease forwards;
      opacity: 0; transform: translateY(16px);
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .header { text-align: center; }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--muted);
      text-decoration: none; margin-bottom: 20px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }
    h1 {
      font-size: 1.5rem; font-weight: 600;
      letter-spacing: -0.3px; margin-bottom: 6px;
    }
    .subtitle { font-size: 0.8rem; color: var(--muted); }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .input-label {
      font-size: 0.7rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      display: block; margin-bottom: 8px;
    }

    .input-row {
      display: flex; gap: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 4px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: rgba(99,102,241,0.5); }

    #number {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 11px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem; color: var(--text);
      letter-spacing: 1px;
    }
    #number::placeholder { color: rgba(255,255,255,0.2); }

    #submit {
      padding: 10px 18px;
      background: var(--accent);
      border: none; border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      color: white; cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #submit:hover { background: var(--accent2); transform: translateY(-1px); }
    #submit:active { transform: translateY(0); }
    #submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Result */
    #result { min-height: 20px; }

    .loading {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.8rem; color: var(--muted);
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(99,102,241,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .code-box {
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px; padding: 20px;
      text-align: center;
    }
    .code-label {
      font-size: 0.65rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
    }
    .code-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem; font-weight: 700;
      letter-spacing: 6px; color: var(--text);
      cursor: pointer;
    }
    .copy-btn {
      margin-top: 14px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.72rem; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: all 0.2s; letter-spacing: 1px;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    .error { font-size: 0.8rem; color: var(--red); text-align: center; }

    .steps {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .step {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.75rem; color: var(--muted); line-height: 1.5;
    }
    .step-num {
      width: 18px; height: 18px;
      background: rgba(99,102,241,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 600; color: var(--accent);
      flex-shrink: 0; margin-top: 1px;
    }
    .step strong { color: rgba(255,255,255,0.6); }

    footer {
      font-size: 0.65rem; color: rgba(255,255,255,0.15);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <a href="/" class="back">← Retour</a>
      <h1>Pairing Code</h1>
      <p class="subtitle">Entre ton numéro pour recevoir le code</p>
    </div>

    <div class="card">
      <div>
        <label class="input-label" for="number">Numéro WhatsApp</label>
        <div class="input-row">
          <input id="number" type="tel" placeholder="237612345678" autocomplete="off" inputmode="numeric">
          <button id="submit">Générer</button>
        </div>
      </div>

      <div id="result"></div>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <span>Entre ton numéro <strong>avec l'indicatif pays</strong> (ex: 237...)</span>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <span>Ouvre WhatsApp → <strong>Appareils liés</strong> → <strong>Lier un appareil</strong></span>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <span>Entre le <strong>code à 8 chiffres</strong> affiché</span>
        </div>
      </div>
    </div>

    <footer>Nebula Bot © <span id="yr"></span> — Dark Neon</footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const btn    = document.getElementById('submit');
    const input  = document.getElementById('number');
    const result = document.getElementById('result');
    let currentCode = '';

    async function copyCode() {
      try {
        await navigator.clipboard.writeText(currentCode);
        const cb = document.getElementById('copyBtn');
        if (cb) {
          cb.textContent = '✓ Copié !';
          cb.classList.add('copied');
          setTimeout(() => {
            cb.textContent = 'Copier le code';
            cb.classList.remove('copied');
          }, 2000);
        }
      } catch(e) {}
    }

    btn.addEventListener('click', async () => {
      const raw = input.value.replace(/[^0-9]/g, '');
      if (!raw) {
        result.innerHTML = `<p class="error">❗ Entre ton numéro WhatsApp</p>`;
        return;
      }
      if (raw.length < 10) {
        result.innerHTML = `<p class="error">❌ Numéro invalide — inclus l'indicatif pays</p>`;
        return;
      }

      btn.disabled = true;
      result.innerHTML = `<div class="loading"><div class="spinner"></div><span>Génération en cours...</span></div>`;

      try {
        const { data } = await axios(`/code?number=${raw}`);
        currentCode = data.code || '';

        if (data.code && data.code !== '❗ Service indisponible') {
          result.innerHTML = `
            <div class="code-box">
              <p class="code-label">Ton code de connexion</p>
              <div class="code-value" onclick="copyCode()">${data.code}</div>
              <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copier le code</button>
            </div>`;
        } else {
          result.innerHTML = `<p class="error">⚠️ Service indisponible — Réessaie dans quelques secondes</p>`;
        }
      } catch(e) {
        result.innerHTML = `<p class="error">⚠️ Erreur de connexion — Réessaie</p>`;
      } finally {
        btn.disabled = false;
      }
    });

    input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
